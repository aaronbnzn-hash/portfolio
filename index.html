<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aaron | The Way of the PM</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
--sumi-black: #131313;
--shu-iro-red: #B22222;
--washi-gray: #1c1b1b;
--gold-accent: #D4AF37;
--text-main: #E0E0E0;
--text-dim: #A0A0A0;
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
scroll-behavior: smooth;
}

body {
background-color: var(--sumi-black);
color: var(--text-main);
font-family: 'Inter', sans-serif;
overflow-x: hidden;
background-image:
radial-gradient(circle at 50% 50%, rgba(178, 34, 34, 0.05) 0%, transparent 70%),
url('https://www.transparenttextures.com/patterns/handmade-paper.png');
}

h1, h2, h3 {
font-family: 'Noto Serif', serif;
letter-spacing: -0.02em;
}

.container {
max-width: 1200px;
margin: 0 auto;
padding: 0 2rem;
}

/* Sakura */
.sakura-container {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 50vh;
pointer-events: none;
overflow: hidden;
}

.petal {
position: absolute;
background-color: var(--shu-iro-red);
border-radius: 100% 0 100% 0;
animation: fall linear infinite;
}

@keyframes fall {
0% { transform: translateY(-10px); }
100% { transform: translateY(50vh); }
}

/* Nav */
nav {
position: fixed;
top: 0;
width: 100%;
padding: 1.5rem 0;
backdrop-filter: blur(10px);
border-bottom: 1px solid rgba(212,175,55,0.1);
}

nav .container {
display: flex;
justify-content: space-between;
align-items: center;
}

.logo {
color: var(--shu-iro-red);
text-decoration: none;
font-weight: bold;
}

.nav-links {
display: flex;
gap: 2rem;
}

.nav-links a {
color: var(--text-dim);
text-decoration: none;
}

.contact-btn {
border: 1px solid var(--shu-iro-red);
padding: 0.5rem 1rem;
}

/* Sections */
section {
padding: 8rem 0;
min-height: 100vh;
}

/* Hero */
.hero h1 {
font-size: 3.5rem;
}

.hero span {
color: var(--shu-iro-red);
}

/* Grid */
.projects-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 2rem;
margin-top: 3rem;
}

.project-tile {
background: var(--washi-gray);
padding: 2rem;
cursor: pointer;
}

/* Footer */
footer {
text-align: center;
padding: 3rem;
color: var(--text-dim);
}
</style>
</head>

<body>

<div id="sakura" class="sakura-container"></div>

<nav>
<div class="container">
<a href="#" class="logo">AARON</a>
<div class="nav-links">
<a href="#home">Home</a>
<a href="#work">Work</a>
<a href="#about">About</a>
</div>
<a href="mailto:Aaronbnzn@gmail.com" class="contact-btn">CONTACT</a>
</div>
</nav>

<div class="container">

<section id="home" class="hero">
<h1>The Path of <span>Strategic Mastery</span></h1>
<p>A product leader merging discipline with strategy.</p>
</section>

<section id="work">
<h2>Projects</h2>

<div class="projects-grid">
<div class="project-tile">
<h3>Lenskart</h3>
<p>Retention strategy project.</p>
</div>

<div class="project-tile">
<h3>Amul Organic</h3>
<p>Supply chain research.</p>
</div>
</div>

</section>

<section id="about">
<h2>About Me</h2>
<p>Product thinker focused on clarity and execution.</p>
</section>

</div>

<footer>
© 2024 Aaron
</footer>

<script>
const container = document.getElementById('sakura');

function createPetal() {
const p = document.createElement('div');
p.classList.add('petal');

p.style.width = "6px";
p.style.height = "4px";
p.style.left = Math.random() * 100 + "vw";
p.style.animationDuration = "5s";

container.appendChild(p);

setTimeout(() => p.remove(), 5000);
}

setInterval(createPetal, 300);
</script>

</body>
</html>
